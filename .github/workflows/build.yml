name: Build packages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    container:
      image: archlinux:base-devel
      options: --privileged
    steps:
      - uses: actions/checkout@v4

      - name: Prep system + build user
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm --needed python-yaml
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          chown -R builder:builder "$GITHUB_WORKSPACE"

      - name: Generate meta-package PKGBUILDs from manifest.yaml
        run: |
          python ci/generate_meta_packages.py
          chown -R builder:builder "$GITHUB_WORKSPACE"

      - name: Build all packages
        run: |
          mkdir -p dist
          for dir in */; do
            pkg="${dir%/}"
            [ -f "$pkg/PKGBUILD" ] || continue
            echo "Building $pkg"
            su builder -c "cd $GITHUB_WORKSPACE/$pkg && makepkg --nodeps --noconfirm --clean"
            cp "$pkg"/*.pkg.tar.zst dist/
          done
      - name: Create repo database
        run: |
          cd dist
          repo-add bitglyph.db.tar.zst *.pkg.tar.zst

          # Replace the repo-add symlinks with real files (GitHub Releases can't upload symlinks)
          for link in bitglyph.db bitglyph.files; do
            target=$(readlink -f "$link")
            rm "$link"
            cp "$target" "$link"
          done
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest packages
          files: dist/*
          make_latest: true
