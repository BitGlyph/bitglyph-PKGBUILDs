name: Build packages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      repos: ${{ steps.repos.outputs.repos }}
    container:
      image: archlinux:base-devel
      options: --privileged
    steps:
      - uses: actions/checkout@v4

      - name: Prep system + build user
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm --needed python-yaml jq
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          chown -R builder:builder "$GITHUB_WORKSPACE"

      - name: Generate meta-package PKGBUILDs from manifest.yaml
        run: |
          python ci/generate_meta_packages.py
          chown -R builder:builder "$GITHUB_WORKSPACE"

      - name: Build all packages
        run: |
          mkdir -p dist/stable
          # Ship manifest.yaml alongside the stable release so downstream
          # repos (e.g. bitglyph-iso) can pull the package list that
          # produced this build straight from the `latest` release.
          cp manifest.yaml dist/stable/
          for dir in */; do
            pkg="${dir%/}"
            [ -f "$pkg/PKGBUILD" ] || continue
            echo "Building $pkg"
            su builder -c "cd $GITHUB_WORKSPACE/$pkg && makepkg --nodeps --noconfirm --clean"
            for built in "$pkg"/*.pkg.tar.zst; do
              [ -e "$built" ] || continue
              # A PKGBUILD's groups=() array is what declares its release tag:
              # any group name routes the package exclusively to dist/<group>/
              # (its own repo/release), instead of the default dist/stable/.
              pkg_groups=$(bsdtar -xOf "$built" .PKGINFO | sed -n 's/^group = //p')
              if [ -n "$pkg_groups" ]; then
                while IFS= read -r g; do
                  mkdir -p "dist/$g"
                  cp "$built" "dist/$g/"
                done <<< "$pkg_groups"
              else
                cp "$built" dist/stable/
              fi
            done
          done

      - name: Create repo databases
        run: |
          cd dist
          for repo in */; do
            repo="${repo%/}"
            cd "$repo"
            shopt -s nullglob
            pkgs=(*.pkg.tar.zst)
            if [ ${#pkgs[@]} -gt 0 ]; then
              dbname=bitglyph.db.tar.zst
              [ "$repo" != "stable" ] && dbname="bitglyph-$repo.db.tar.zst"
              repo-add "$dbname" "${pkgs[@]}"

              # Replace the repo-add symlinks with real files (GitHub Releases can't upload symlinks)
              for link in "${dbname%.tar.zst}" "${dbname%.db.tar.zst}.files"; do
                [ -L "$link" ] || continue
                target=$(readlink -f "$link")
                rm "$link"
                cp "$target" "$link"
              done
            fi
            cd ..
          done

      - name: Determine which repos have packages
        id: repos
        run: |
          cd dist
          repos=$(for d in */; do
            d="${d%/}"
            [ -n "$(ls -A "$d" 2>/dev/null)" ] && echo "$d"
          done | jq -R . | jq -s -c .)
          echo "repos=$repos" >> "$GITHUB_OUTPUT"

      - name: Upload built repos
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        repo: ${{ fromJson(needs.build.outputs.repos) }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish ${{ matrix.repo }} release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ matrix.repo == 'stable' && 'latest' || format('{0}-latest', matrix.repo) }}
          name: ${{ matrix.repo == 'stable' && 'Latest packages' || format('Latest {0} packages', matrix.repo) }}
          files: dist/${{ matrix.repo }}/*
          make_latest: ${{ matrix.repo == 'stable' }}
