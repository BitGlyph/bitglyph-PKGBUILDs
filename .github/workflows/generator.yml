name: Generate meta-package PKGBUILDs

on:
  push:
    branches: [main]
    paths:
      - manifest.yaml
      - ci/generate_meta_packages.py
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Run generator
        run: python ci/generate_meta_packages.py

      - name: Open PR with regenerated PKGBUILDs
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "Regenerate meta-package PKGBUILDs from manifest.yaml"
          branch: generated/meta-packages
          delete-branch: true
          title: "Regenerate meta-package PKGBUILDs"
          body: Auto-generated by `ci/generate_meta_packages.py` from `manifest.yaml`. Review the dependency diffs before merging.
